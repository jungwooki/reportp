<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P-REPORT | Parent Performance Report</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
            slatebrand: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              600: '#475569',
              500: '#64748b',
              400: '#94a3b8',
              300: '#cbd5e1',
              200: '#e2e8f0',
              100: '#f1f5f9',
              50: '#f8fafc',
            }
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --a4-width: 210mm;
      --a4-height: 297mm;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      letter-spacing: -0.015em;
      background: #eef2f7;
      color: #334155;
    }

    textarea {
      resize: none;
      overflow: hidden;
    }

    textarea:focus,
    input:focus,
    select:focus {
      outline: none;
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.12);
    }

    .page-a4 {
      width: var(--a4-width);
      height: var(--a4-height);
      margin: 8mm auto;
      background: #ffffff;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      box-sizing: border-box;
      position: relative;
      overflow: visible;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 10mm 11mm 7mm 11mm;
      row-gap: 4.5mm;
      page-break-after: always;
      break-after: page;
    }

    .page-a4:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .page-header,
    .page-content,
    .page-footer {
      min-height: 0;
    }

    .page-content {
      overflow: visible;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .brand-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
      opacity: 0.78;
      margin-top: 1px;
    }

    .brand-mark {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: #0284c7;
    }

    .report-title {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
      margin-top: 2px;
    }

    .report-subtitle {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
    }

    .page-badge {
      font-size: 10px;
      font-weight: 700;
      color: #0369a1;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 9999px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .card-report {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.03);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .soft-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-accent {
      width: 6px;
      height: 18px;
      background: #0ea5e9;
      border-radius: 9999px;
      display: inline-block;
    }

    .footer-note {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      font-size: 7px;
      color: #94a3b8;
      border-top: 1px solid #e2e8f0;
      padding-top: 2.5mm;
      line-height: 1.3;
    }

    .footer-copy {
      font-weight: 700;
      color: #64748b;
      white-space: nowrap;
    }

    .floating-edit-panel {
      background: #0f172a;
      color: white;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 16px 40px rgba(2, 8, 23, 0.35);
    }

    .edit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
    }

    .edit-label {
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 4px;
      display: block;
    }

    .edit-input,
    .edit-select {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 12px;
      color: #ffffff;
      line-height: 1.2;
    }

    .edit-input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .edit-select option {
      color: #111827;
      background: #ffffff;
    }

    .score-bar-bg {
      background: #e2e8f0;
    }

    .score-good {
      background: #10b981;
    }

    .score-caution {
      background: #f59e0b;
    }

    .score-danger {
      background: #ef4444;
    }

    .doctor-name-input {
      width: 90px;
      background: transparent;
      border: 0;
      border-bottom: 1px solid #cbd5e1;
      outline: none;
      text-align: right;
      font-weight: 700;
      color: #334155;
      padding: 1px 2px;
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      * {
        filter: none !important;
        backdrop-filter: none !important;
        text-shadow: none !important;
      }

      .page-a4 {
        margin: 0;
        box-shadow: none !important;
      }

      .no-print {
        display: none !important;
      }

      textarea {
        border: 1px solid transparent !important;
        background: transparent !important;
        color: #111827 !important;
        padding: 0 !important;
        resize: none !important;
        overflow: hidden !important;
      }

      .doctor-name-input {
        border-bottom: 1px solid #cbd5e1 !important;
      }
    }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name, size, className]);
      return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
    };

    const App = () => {
      const [inputs, setInputs] = useState({
        name: "김재민",
        birthDate: "2013.05.21",
        teamName: "샘플 FC 아카데미",
        chartNo: "P-2026-001",

        ecwRatio: 0.382,
        ecwSignal: "green",

        bodyFat: 18.6,
        bodyFatSignal: "yellow",

        regulation: 10.34,
        regulationSignal: "yellow",

        balance: 62.49,
        balanceSignal: "green",

        physicalStress: 44.24,
        physicalStressSignal: "yellow",

        mentalStress: 1.67,
        mentalStressSignal: "yellow",

        fatigue: 7.03,
        fatigueSignal: "red",

        stability: 6.52,
        stabilitySignal: "green",

        coping: 145.54,
        copingSignal: "green",

        phvStage: 0
      });

      const [ultrasound, setUltrasound] = useState({
        achilles: { left: 'GREEN', right: 'GREEN' },
        patellar: { left: 'YELLOW', right: 'ORANGE' },
        plantar: { left: 'GREEN', right: 'GREEN' }
      });

      const [showInputs, setShowInputs] = useState(false);
      const [doctorComment, setDoctorComment] = useState("");
      const [ultrasoundComment, setUltrasoundComment] = useState("");
      const [doctorName, setDoctorName] = useState("이정욱");

      const scores = useMemo(() => {
        const s = {};
        const getValScore = (v, th, inv = false) => {
          if (!inv) return v >= th[0] ? 0 : v >= th[1] ? 30 : v >= th[2] ? 60 : 90;
          return v <= th[0] ? 0 : v <= th[1] ? 30 : v <= th[2] ? 60 : 90;
        };

        s.ecw = getValScore(inputs.ecwRatio, [0.380, 0.385, 0.390], true);
        s.bodyFat = (inputs.bodyFat >= 10 && inputs.bodyFat <= 15) ? 0 : inputs.bodyFat >= 8 ? 30 : inputs.bodyFat >= 6 ? 60 : 90;
        s.regulation = getValScore(inputs.regulation, [6.5, 5.5, 4.5]);
        s.balance = getValScore(inputs.balance, [15, 18, 21], true);
        s.physicalStress = getValScore(inputs.physicalStress, [40, 50, 60], true);
        s.mentalStress = getValScore(inputs.mentalStress, [0.25, 0.50, 0.80], true);
        s.coping = getValScore(inputs.coping, [40, 35, 30]);
        s.fatigue = getValScore(inputs.fatigue, [4.5, 5.5, 6.5], true);
        s.stability = getValScore(inputs.stability, [6.3, 5.9, 5.4]);

        s.recoveryIdx = (s.regulation + s.stability + s.fatigue + s.balance) / 4;
        s.otsIdx = (s.fatigue + s.physicalStress + s.balance + s.regulation + s.stability + s.ecw) / 6;
        s.redsIdx = (s.bodyFat + s.ecw + s.fatigue + s.stability + s.physicalStress) / 5;

        const baseRisk = (0.4 * s.recoveryIdx) + (0.35 * s.otsIdx) + (0.25 * s.redsIdx);
        const phvMap = { "-2": 0.9, "-1": 1.0, "0": 1.35, "1": 1.15, "2": 1.0 };
        s.growthRiskIdx = baseRisk * (phvMap[inputs.phvStage.toString()] || 1.0);

        return s;
      }, [inputs]);

      useEffect(() => {
        const drDraft = `${inputs.name} 선수는 현재 성장 단계(PHV ${inputs.phvStage})와 컨디션 데이터를 종합했을 때, 수분 밸런스와 누적 피로 관리가 중요한 시점입니다. 특히 급성장 전후에는 관절과 건 조직의 부담이 커질 수 있으므로 훈련 강도보다 회복의 질을 우선적으로 점검하는 것이 좋습니다. 현재 성장기 가중 위험도는 ${scores.growthRiskIdx.toFixed(1)}점으로 평가되며, 수면과 영양, 운동 후 관리가 경기력 유지에 중요한 영향을 줄 수 있습니다.`;
        setDoctorComment(drDraft);

        const usDraft = `${ultrasound.patellar.right === 'ORANGE' ? '우측 슬개건 부위' : '주요 하지 부위'}에 반복 부하의 흔적이 관찰됩니다. 운동 전후 종아리, 허벅지, 무릎 주변 스트레칭을 충분히 시행하고, 훈련 후 냉찜질 및 회복 루틴을 꼼꼼히 적용해 주세요. 통증이 반복되면 강도를 잠시 낮추고 추가 점검이 필요합니다.

마지막으로, 본 평가는 부위별 기능 불균형에 대해 조기에 발견하기 위해 스포츠한의학 평가 목적으로 시행되었습니다. 질병 및 부상에 대한 부분은 의료기관으로 내원하시어 종합적 진료를 받으시는 것을 추천드립니다.`;
        setUltrasoundComment(usDraft);
      }, [scores.growthRiskIdx, ultrasound.patellar, inputs.name, inputs.phvStage]);

      const handlePrint = () => window.print();

      return (
        <div className="min-h-screen pb-20 print:pb-0 font-medium">
          <div className={`fixed top-0 left-0 right-0 z-50 transition-transform duration-300 no-print ${showInputs ? 'translate-y-0' : '-translate-y-[93%]'}`}>
            <div className="floating-edit-panel p-8 pb-12">
              <div className="max-w-6xl mx-auto space-y-5">
                <div className="flex justify-between items-center border-b border-white/15 pb-3">
                  <h2 className="text-xl font-bold flex items-center gap-2">
                    <Icon name="settings" size={20} /> P-REPORT 데이터 수정
                  </h2>
                  <button onClick={() => setShowInputs(false)} className="text-slate-400 hover:text-white">
                    <Icon name="x" size={24} />
                  </button>
                </div>

                <div className="grid grid-cols-5 gap-4">
                  <InputGroup title="1. 선수 프로필">
                    <Input label="이름" value={inputs.name} onChange={v => setInputs({...inputs, name: v})} type="text" />
                    <Input label="차트번호" value={inputs.chartNo} onChange={v => setInputs({...inputs, chartNo: v})} type="text" />
                    <Input label="생년월일" value={inputs.birthDate} onChange={v => setInputs({...inputs, birthDate: v})} type="text" />
                    <Input label="소속팀" value={inputs.teamName} onChange={v => setInputs({...inputs, teamName: v})} type="text" />
                  </InputGroup>

                  <InputGroup title="2. 체수분 / 체성분">
                    <SignalSelect
                      label="ECW-Ratio"
                      step="0.001"
                      value={inputs.ecwRatio}
                      signal={inputs.ecwSignal}
                      onValueChange={v => setInputs({ ...inputs, ecwRatio: v })}
                      onSignalChange={v => setInputs({ ...inputs, ecwSignal: v })}
                    />

                    <SignalSelect
                      label="체지방률"
                      step="0.1"
                      value={inputs.bodyFat}
                      signal={inputs.bodyFatSignal}
                      onValueChange={v => setInputs({ ...inputs, bodyFat: v })}
                      onSignalChange={v => setInputs({ ...inputs, bodyFatSignal: v })}
                    />

                    <Select label="성장단계(PHV)" value={inputs.phvStage} onChange={v => setInputs({...inputs, phvStage: parseInt(v)})}>
                      <option value="-2">PHV -2 (이전)</option>
                      <option value="-1">PHV -1 (시작)</option>
                      <option value="0">PHV 0 (급성장)</option>
                      <option value="1">PHV 1 (둔화)</option>
                      <option value="2">PHV 2 (종료)</option>
                    </Select>
                  </InputGroup>

                  <InputGroup title="3. HRV 분석 A">
                    <SignalSelect
                      label="조절능력"
                      value={inputs.regulation}
                      signal={inputs.regulationSignal}
                      onValueChange={v => setInputs({ ...inputs, regulation: v })}
                      onSignalChange={v => setInputs({ ...inputs, regulationSignal: v })}
                    />

                    <SignalSelect
                      label="균형도"
                      value={inputs.balance}
                      signal={inputs.balanceSignal}
                      onValueChange={v => setInputs({ ...inputs, balance: v })}
                      onSignalChange={v => setInputs({ ...inputs, balanceSignal: v })}
                    />

                    <SignalSelect
                      label="신체부하"
                      value={inputs.physicalStress}
                      signal={inputs.physicalStressSignal}
                      onValueChange={v => setInputs({ ...inputs, physicalStress: v })}
                      onSignalChange={v => setInputs({ ...inputs, physicalStressSignal: v })}
                    />
                  </InputGroup>

                  <InputGroup title="4. HRV 분석 B">
                    <SignalSelect
                      label="정신부하"
                      value={inputs.mentalStress}
                      signal={inputs.mentalStressSignal}
                      onValueChange={v => setInputs({ ...inputs, mentalStress: v })}
                      onSignalChange={v => setInputs({ ...inputs, mentalStressSignal: v })}
                    />

                    <SignalSelect
                      label="피로도"
                      value={inputs.fatigue}
                      signal={inputs.fatigueSignal}
                      onValueChange={v => setInputs({ ...inputs, fatigue: v })}
                      onSignalChange={v => setInputs({ ...inputs, fatigueSignal: v })}
                    />

                    <SignalSelect
                      label="심장안정도"
                      value={inputs.stability}
                      signal={inputs.stabilitySignal}
                      onValueChange={v => setInputs({ ...inputs, stability: v })}
                      onSignalChange={v => setInputs({ ...inputs, stabilitySignal: v })}
                    />

                    <SignalSelect
                      label="대처능력"
                      value={inputs.coping}
                      signal={inputs.copingSignal}
                      onValueChange={v => setInputs({ ...inputs, coping: v })}
                      onSignalChange={v => setInputs({ ...inputs, copingSignal: v })}
                    />
                  </InputGroup>

                  <InputGroup title="5. 초음파 판독 (좌 → 우)">
                    <UltrasoundInput label="아킬레스건" value={ultrasound.achilles} onChange={v => setUltrasound({...ultrasound, achilles: v})} />
                    <UltrasoundInput label="무릎(슬개건)" value={ultrasound.patellar} onChange={v => setUltrasound({...ultrasound, patellar: v})} />
                    <UltrasoundInput label="발바닥(족저)" value={ultrasound.plantar} onChange={v => setUltrasound({...ultrasound, plantar: v})} />
                  </InputGroup>
                </div>
              </div>
            </div>

            <button onClick={() => setShowInputs(!showInputs)} className="mx-auto flex items-center justify-center gap-2 bg-sky-600 text-white px-6 py-2.5 rounded-b-lg shadow-md font-bold text-sm hover:bg-sky-700">
              {showInputs ? '닫기' : '데이터 편집 열기'}
            </button>
          </div>

          <button
            onClick={handlePrint}
            className="no-print fixed bottom-8 right-8 z-50 bg-slate-900 hover:bg-slate-800 text-white px-6 py-4 rounded-full shadow-xl font-bold flex items-center gap-2 text-lg border border-white/10"
          >
            <Icon name="printer" size={24} /> PDF 저장 및 인쇄
          </button>

          {/* PAGE 1 */}
          <div className="page-a4">
            <div className="page-header">
              <div className="report-header">
                <div className="brand-wrap">
                  <img src="logo.png" alt="P-REPORT Logo" className="brand-logo" />
                  <div>
                    <div className="brand-mark">P-REPORT</div>
                    <div className="report-title">선수 종합 평가</div>
                    <div className="report-subtitle">Parent Performance Summary Report</div>
                  </div>
                </div>
                <div className="page-badge">PAGE 1 · 종합분석</div>
              </div>
            </div>

            <div className="page-content space-y-5">
              <div className="card-report p-4">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="text-2xl font-bold text-slate-900">{inputs.name} <span className="text-base font-normal text-slate-500">선수</span></div>
                    <div className="text-sm text-slate-500 mt-1">{inputs.teamName}</div>
                  </div>
                  <div className="text-right bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                    <div className="text-xs text-slate-400 font-medium mb-0.5">기본 정보</div>
                    <div className="text-sm font-semibold text-slate-700">{inputs.birthDate}</div>
                    <div className="text-xs text-slate-500 mt-1">{inputs.chartNo}</div>
                  </div>
                </div>
              </div>

              <div>
                <h2 className="section-title"><span className="section-accent"></span>성장단계를 고려한 부상위험도</h2>
                <div className="bg-slate-900 rounded-2xl p-6 flex items-center gap-8 text-white">
                  <div className="flex-1">
                    <div className="inline-block bg-sky-600 text-white text-xs font-bold px-2.5 py-1 rounded mb-3">종합 분석 결과</div>
                    <h3 className="text-2xl font-extrabold mb-2">Growth Risk Index</h3>
                    <p className="text-slate-300 text-sm leading-relaxed font-medium">
                      아이가 현재 속한 성장 단계(PHV)와 피로도, 스트레스, 회복력 데이터를 함께 반영한 종합 위험도입니다.
                      점수가 높을수록 훈련 강도보다 회복과 컨디션 관리의 비중을 높여야 합니다.
                    </p>
                  </div>

                  <CircularScore score={scores.growthRiskIdx} />
                </div>
              </div>

              <div>
                <h2 className="section-title"><span className="section-accent"></span>3대 필수 컨디션 지표</h2>
                <p className="text-slate-500 text-sm font-semibold mb-4">
                  모든 점수는 0점에 가까울수록 좋습니다. 바가 길어질수록 해당 영역의 관리가 필요합니다.
                </p>

                <div className="grid grid-cols-1 gap-4">
                  <ScoreCard
                    icon="battery-charging"
                    title="선수 컨디션 지수 (회복력)"
                    desc="다음 훈련을 안정적으로 소화할 수 있는 회복 상태를 의미합니다."
                    score={scores.recoveryIdx}
                  />
                  <ScoreCard
                    icon="alert-triangle"
                    title="과부하 및 번아웃 위험도"
                    desc="몸이 견디기 어려울 정도로 피로가 누적되고 있는지 확인합니다."
                    score={scores.otsIdx}
                  />
                  <ScoreCard
                    icon="activity"
                    title="성장 에너지 부족 위험도"

                      운동 후 허벅지와 종아리를 가볍게 풀어주고, 무릎과 발목이 뻐근할 때는 10~15분 정도 냉찜질을 해 주세요.

                  운동과 성장 모두를 지지할 수 있도록 식사 타이밍과 수분 보충을 함께 관리해 주세요.

                      "하루 전체 수분 섭취량을 안정적으로 확보하는 것이 중요합니다."
                    ]}
                  />

            <PageFooter />
          </div>
        </div>
      );
    };

    const CircularScore = ({ score }) => {
      const normalized = Math.max(0, Math.min(100, score));
      const radius = 54;
      const circumference = 2 * Math.PI * radius;
      const dashOffset = circumference - (normalized / 100) * circumference;

      const statusText = normalized > 50 ? '관리 필요' : normalized > 25 ? '주의' : '안정';
      const strokeColor = normalized > 50 ? '#ef4444' : normalized > 25 ? '#f59e0b' : '#10b981';

      return (
        <div className="w-[150px] h-[150px] bg-white rounded-2xl border border-slate-200 flex items-center justify-center shrink-0">
          <div className="relative w-[128px] h-[128px]">
            <svg width="128" height="128" viewBox="0 0 128 128" className="absolute inset-0 -rotate-90">
              <circle cx="64" cy="64" r={radius} fill="none" stroke="#e2e8f0" strokeWidth="10" />
              <circle
                cx="64"
                cy="64"
                r={radius}
                fill="none"
                stroke={strokeColor}
                strokeWidth="10"
                strokeLinecap="round"
                strokeDasharray={circumference}
                strokeDashoffset={dashOffset}
              />
            </svg>

            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <div className="text-[11px] font-bold text-slate-400">RISK</div>
              <div className="text-3xl font-extrabold text-slate-900 leading-none mt-1">{normalized.toFixed(1)}</div>
              <div className={`mt-2 px-2 py-0.5 rounded text-[10px] font-bold ${
                normalized > 50
                  ? 'bg-red-50 text-red-600'
                  : normalized > 25
                  ? 'bg-yellow-50 text-yellow-700'
                  : 'bg-green-50 text-green-700'
              }`}>
                {statusText}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const PageFooter = () => (
      <div className="page-footer">
        <footer className="footer-note">
          <div className="footer-copy">© juniorgoldenage</div>
          <div className="flex-1 text-right">
            본 출력물은 juniorgoldenage의 데이터 시각화 리포트입니다. 의료법상 의료행위를 직접 수행하지 않으며, 제휴 의료기관의 검사 결과를 기반으로 분석 정보를 제공합니다. 의학적 판단 및 진단은 반드시 의료진을 통해 확인해야 합니다.
          </div>
        </footer>
      </div>
    );

    const ScoreCard = ({ icon, title, desc, score }) => {
      const isDanger = score > 50;
      const isCaution = score > 25 && score <= 50;
      const barClass = isDanger ? 'score-danger' : isCaution ? 'score-caution' : 'score-good';
      const statusText = isDanger ? '관리 필요' : isCaution ? '주의' : '좋음';
      const statusColor = isDanger
        ? 'text-red-600 bg-red-50'
        : isCaution
        ? 'text-yellow-700 bg-yellow-50'
        : 'text-green-700 bg-green-50';

      return (
        <div className="card-report flex items-center gap-4 py-4 px-4">
          <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">
            <Icon name={icon} size={20} />
          </div>
          <div className="flex-1">
            <h4 className="text-sm font-bold text-slate-900 mb-0.5">{title}</h4>
            <p className="text-[11px] text-slate-500 font-semibold leading-tight">{desc}</p>
          </div>
          <div className="w-[120px] flex flex-col items-end shrink-0">
            <div className="flex justify-between w-full items-baseline mb-2">
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${statusColor}`}>{statusText}</span>
              <span className="text-lg font-extrabold text-slate-900">{score.toFixed(1)}</span>
            </div>
            <div className="w-full h-1.5 score-bar-bg rounded-full overflow-hidden">
              <div className={`h-full rounded-full ${barClass}`} style={{ width: `${Math.min(100, score)}%` }}></div>
            </div>
          </div>
        </div>
      );
    };

    const DetailBox = ({ title, icon, children }) => (
      <div className="card-report p-4">
        <h4 className="text-sm font-bold mb-4 flex items-center gap-2 text-slate-900 border-b border-slate-100 pb-2">
          <Icon name={icon} size={16} className="text-sky-600" /> {title}
        </h4>
        <div className="space-y-5">{children}</div>
      </div>
    );

    const DetailSignal = ({ label, value, signal, desc }) => {
      const signalMap = {
        green: {
          badge: "🟢 안정",
          className: "bg-green-50 text-green-700 border-green-200"
        },
        yellow: {
          badge: "🟡 주의",
          className: "bg-yellow-50 text-yellow-700 border-yellow-200"
        },
        red: {
          badge: "🔴 위험",
          className: "bg-red-50 text-red-600 border-red-200"
        }
      };

      const current = signalMap[signal] || signalMap.green;

      return (
        <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
          <div className="flex justify-between items-start gap-3 mb-1">
            <div className="font-bold text-slate-800 text-xs leading-snug">{label}</div>
            <div className={`text-[10px] font-bold px-2 py-0.5 rounded border whitespace-nowrap ${current.className}`}>
              {current.badge}
            </div>
          </div>

          <div className="text-sm font-extrabold text-slate-900 mb-1">{value}</div>
          <p className="text-[10px] text-slate-500 font-semibold leading-tight">{desc}</p>
        </div>
      );
    };

    const UltrasoundCard = ({ name, left, right }) => {
      const getColor = (v) => v === 'GREEN' ? 'bg-green-500' : v === 'YELLOW' ? 'bg-yellow-500 text-slate-900' : 'bg-red-500';
      const getText = (v) => v === 'GREEN' ? '양호' : v === 'YELLOW' ? '주의' : '위험';

      return (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-center">
          <h5 className="font-bold text-slate-800 text-xs mb-2.5">{name}</h5>
          <div className="flex justify-center gap-3">
            <div className="flex flex-col items-center">
              <span className="text-[10px] text-slate-500 font-bold mb-1">왼쪽(L)</span>
              <span className={`px-2.5 py-0.5 rounded text-white font-bold text-[11px] border border-black/10 ${getColor(left)}`}>{getText(left)}</span>
            </div>
            <div className="w-px bg-slate-200"></div>
            <div className="flex flex-col items-center">
              <span className="text-[10px] text-slate-500 font-bold mb-1">오른쪽(R)</span>
              <span className={`px-2.5 py-0.5 rounded text-white font-bold text-[11px] border border-black/10 ${getColor(right)}`}>{getText(right)}</span>
            </div>
          </div>
        </div>
      );
    };

    const NutritionRow = ({ time, items, icon }) => (
      <div className="bg-white/10 rounded-lg p-4 flex gap-3">
        <div className="w-8 h-8 rounded bg-white/15 flex items-center justify-center shrink-0">
          <Icon name={icon} size={16} />
        </div>
        <div>
          <h5 className="font-bold text-white text-sm mb-2">{time}</h5>
          <ul className="space-y-1.5">
            {items.map((item, i) => (
              <li key={i} className="text-xs font-medium text-slate-200 flex items-start gap-1.5">
                <span className="text-sky-400 mt-0.5 text-[10px]">■</span> {item}
              </li>
            ))}
          </ul>
        </div>
      </div>
    );

    const CircularRadarChart = ({ axes }) => {
      const size = 190;
      const center = size / 2;
      const radius = 58;
      const totalAxes = axes.length;

      const points = axes.map((axis, i) => {
        const angle = (Math.PI * 2 * i) / totalAxes - Math.PI / 2;
        const r = (axis.score / 100) * radius;
        return {
          x: center + r * Math.cos(angle),
          y: center + r * Math.sin(angle),
          labelX: center + (radius + 30) * Math.cos(angle),
          labelY: center + (radius + 30) * Math.sin(angle),
          angle,
          label: axis.label
        };
      });

      const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ') + ' Z';

      return (
        <svg width={size + 30} height={size + 30} viewBox={`0 0 ${size + 30} ${size + 30}`} className="overflow-visible">
          {[0.25, 0.5, 0.75, 1].map(scale => (
            <circle
              key={scale}
              cx={center}
              cy={center}
              r={radius * scale}
              fill="none"
              stroke="#e2e8f0"
              strokeWidth="1"
              strokeDasharray="3 3"
            />
          ))}

          {points.map((p, i) => (
            <line
              key={`line-${i}`}
              x1={center}
              y1={center}
              x2={center + radius * Math.cos(p.angle)}
              y2={center + radius * Math.sin(p.angle)}
              stroke="#cbd5e1"
              strokeWidth="1"
            />
          ))}

          <path d={path} fill="rgba(14, 165, 233, 0.18)" stroke="#0284c7" strokeWidth="2" strokeLinejoin="round" />
          {points.map((p, i) => (
            <circle key={`c-${i}`} cx={p.x} cy={p.y} r="3" fill="#0f172a" />
          ))}

          {points.map((p, i) => (
            <text
              key={`t-${i}`}
              x={p.labelX}
              y={p.labelY}
              fill="#334155"
              fontSize="11"
              fontWeight="bold"
              textAnchor="middle"
              alignmentBaseline="middle"
            >
              {p.label}
            </text>
          ))}
        </svg>
      );
    };

    const InputGroup = ({ title, children }) => (
      <div className="edit-card space-y-3">
        <h5 className="text-[11px] font-bold text-slate-300 border-b border-white/10 pb-2">{title}</h5>
        <div className="grid gap-2">{children}</div>
      </div>
    );

    const Input = ({ label, value, onChange, step = "0.01", type = "number" }) => (
      <div className="flex flex-col gap-1">
        <label className="edit-label">{label}</label>
        <input
          type={type}
          step={step}
          value={value}
          onChange={e => onChange(type === "number" ? parseFloat(e.target.value) || 0 : e.target.value)}
          className="edit-input"
        />
      </div>
    );

    const Select = ({ label, value, onChange, children }) => (
      <div className="flex flex-col gap-1">
        <label className="edit-label">{label}</label>
        <select
          value={value}
          onChange={e => onChange(e.target.value)}
          className="edit-select"
        >
          {children}
        </select>
      </div>
    );

    const SignalSelect = ({ label, value, signal, onValueChange, onSignalChange, step = "0.01" }) => (
      <div className="grid grid-cols-[1fr_92px] gap-2 items-end">
        <div>
          <label className="edit-label">{label}</label>
          <input
            type="number"
            step={step}
            value={value}
            onChange={e => onValueChange(parseFloat(e.target.value) || 0)}
            className="edit-input"
          />
        </div>

        <div>
          <label className="edit-label">상태</label>
          <select
            value={signal}
            onChange={e => onSignalChange(e.target.value)}
            className="edit-select"
          >
            <option value="green">🟢 안정</option>
            <option value="yellow">🟡 주의</option>
            <option value="red">🔴 위험</option>
          </select>
        </div>
      </div>
    );

    const UltrasoundInput = ({ label, value, onChange }) => (
      <div className="flex flex-col gap-1">
        <label className="edit-label">{label}</label>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="text-[10px] text-slate-400 font-semibold mb-1">왼쪽(L)</div>
            <select
              value={value.left}
              onChange={e => onChange({ ...value, left: e.target.value })}
              className="edit-select"
            >
              <option value="GREEN">양호</option>
              <option value="YELLOW">주의</option>
              <option value="ORANGE">위험</option>
            </select>
          </div>
          <div>
            <div className="text-[10px] text-slate-400 font-semibold mb-1">오른쪽(R)</div>
            <select
              value={value.right}
              onChange={e => onChange({ ...value, right: e.target.value })}
              className="edit-select"
            >
              <option value="GREEN">양호</option>
              <option value="YELLOW">주의</option>
              <option value="ORANGE">위험</option>
            </select>
          </div>
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
